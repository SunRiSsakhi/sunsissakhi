<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story — SunRi-Ssakhi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --terra-deep: #7A2E14;
    --terra-mid: #C0623A;
    --terra-light: #F4A98A;
    --terra-pale: #F9CBB8;
    --terra-cream: #FEF6F2;
    --terra-ivory: #FFFAF8;
    --text-dark: #2A1208;
    --text-mid: #5C3520;
    --text-muted: #9B6B58;
    --border-soft: #F0D0C0;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--terra-ivory); color: var(--text-dark); line-height: 1.7; min-height: 100vh; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,250,248,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .nav-logo { font-family: 'Georgia', 'Playfair Display', serif; font-size: 1.375rem; font-weight: 700; font-style: italic; color: #FEF6F2; background: #7A2E14; padding: 6px 16px; border-radius: 6px; text-decoration: none; letter-spacing: 0.01em; }
  .nav-back { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--terra-mid); }
  .nav-back svg { width: 16px; height: 16px; }

  /* LOADING / ERROR */
  .state-wrap { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .state-box { text-align: center; max-width: 400px; }
  .state-box p { color: var(--text-muted); font-size: 1rem; margin-bottom: 1.5rem; }
  .btn-home { display: inline-block; background: var(--terra-mid); color: white; padding: 12px 24px; border-radius: 100px; font-size: 0.9375rem; text-decoration: none; transition: background 0.2s; }
  .btn-home:hover { background: var(--terra-deep); }

  /* STORY PAGE */
  .story-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }

  .story-header { margin-bottom: 2.5rem; }

  .story-lang-badge {
    display: inline-block;
    font-size: 0.6875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terra-mid);
    background: var(--terra-cream);
    border: 1px solid var(--terra-pale);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 1.25rem;
  }

  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.75rem, 4vw, 2.75rem);
    font-weight: 500;
    line-height: 1.2;
    color: var(--text-dark);
    margin-bottom: 1.25rem;
  }

  .story-author-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-soft);
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--terra-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.875rem; font-weight: 500;
    color: var(--terra-deep);
    flex-shrink: 0;
  }

  .author-name { font-size: 0.9375rem; font-weight: 500; color: var(--text-dark); }
  .author-meta { font-size: 0.8125rem; color: var(--text-muted); }

  /* DECORATIVE LINE */
  .story-accent {
    width: 48px; height: 4px;
    background: linear-gradient(90deg, var(--terra-mid), var(--terra-light));
    border-radius: 2px;
    margin: 2rem 0;
  }

  /* STORY BODY */
  .story-body {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.0625rem, 2vw, 1.1875rem);
    line-height: 1.95;
    color: var(--text-mid);
    word-break: break-word;
  }
  .story-body p {
    margin-bottom: 1.5em;
  }
  .story-body p:last-child {
    margin-bottom: 0;
  }

  /* FOOTER NAV */
  .story-footer-nav {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .back-link {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.9375rem; color: var(--terra-mid);
    text-decoration: none; transition: color 0.2s;
  }
  .back-link:hover { color: var(--terra-deep); }

  .share-btn {
    background: none; border: 1.5px solid var(--terra-pale);
    color: var(--terra-mid); padding: 10px 20px;
    border-radius: 100px; font-size: 0.875rem;
    cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--terra-mid); }

  /* WRITE CTA */
  .write-cta {
    background: var(--terra-cream);
    border-top: 1px solid var(--border-soft);
    padding: 3.5rem 2rem;
    text-align: center;
  }
  .write-cta-inner { max-width: 480px; margin: 0 auto; }
  .write-cta h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 400;
    color: var(--text-dark); margin-bottom: 0.75rem;
  }
  .write-cta h3 em { font-style: italic; color: var(--terra-mid); }
  .write-cta p { font-size: 0.9375rem; color: var(--text-mid); margin-bottom: 1.5rem; line-height: 1.7; }
  .btn-write {
    display: inline-block;
    background: var(--terra-mid); color: white;
    padding: 13px 28px; border-radius: 100px;
    font-size: 0.9375rem; font-weight: 500;
    text-decoration: none; transition: background 0.2s;
  }
  .btn-write:hover { background: var(--terra-deep); }

  /* LIKES */
  .like-bar { display: flex; align-items: center; gap: 0.75rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-soft); }
  .like-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1.5px solid var(--border-soft); border-radius: 100px; padding: 8px 18px; font-size: 0.9375rem; cursor: pointer; font-family: 'Inter', sans-serif; color: var(--text-muted); transition: all 0.2s; }
  .like-btn:hover { border-color: var(--terra-light); color: var(--terra-mid); }
  .like-btn.active-like { background: var(--terra-cream); border-color: var(--terra-mid); color: var(--terra-mid); }
  .like-btn.active-dislike { background: #fef2f2; border-color: #f4a98a; color: #c0623a; }
  .like-label { font-size: 0.875rem; color: var(--text-muted); }

  /* COMMENTS */
  .comments-section { max-width: 720px; margin: 0 auto; padding: 0 2rem 4rem; }
  .comments-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 500; color: var(--text-dark); margin-bottom: 1.5rem; }
  .comment-form { background: white; border: 1px solid var(--border-soft); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; }
  .comment-form textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border-soft); border-radius: 10px; font-size: 0.9375rem; font-family: 'Inter', sans-serif; color: var(--text-dark); background: var(--terra-ivory); outline: none; resize: vertical; min-height: 90px; line-height: 1.6; transition: border-color 0.2s; }
  .comment-form textarea:focus { border-color: var(--terra-mid); }
  .comment-form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; }
  .comment-form-note { font-size: 0.8125rem; color: var(--text-muted); }
  .btn-comment { background: var(--terra-mid); color: white; border: none; padding: 9px 22px; border-radius: 100px; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-comment:hover { background: var(--terra-deep); }
  .btn-comment:disabled { background: var(--terra-pale); cursor: not-allowed; }
  .comment-login-note { background: var(--terra-cream); border: 1px solid var(--border-soft); border-radius: 12px; padding: 1rem 1.25rem; font-size: 0.9rem; color: var(--text-mid); margin-bottom: 2rem; }
  .comment-login-note a { color: var(--terra-mid); text-decoration: none; font-weight: 500; }
  .comment-login-note a:hover { color: var(--terra-deep); }
  .comments-list { display: flex; flex-direction: column; gap: 1rem; }
  .comment-card { background: white; border: 1px solid var(--border-soft); border-radius: 14px; padding: 1.25rem 1.5rem; }
  .comment-header { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.625rem; }
  .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--terra-pale); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 500; color: var(--terra-deep); flex-shrink: 0; }
  .comment-author { font-size: 0.875rem; font-weight: 500; color: var(--text-dark); }
  .comment-date { font-size: 0.75rem; color: var(--text-muted); }
  .comment-body { font-size: 0.9375rem; color: var(--text-mid); line-height: 1.7; }
  .no-comments { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9375rem; }

  /* EMOJI PICKER */
  .emoji-picker { display: none; flex-wrap: wrap; gap: 4px; padding: 8px; background: white; border: 1px solid var(--border-soft); border-radius: 10px; margin-bottom: 8px; }
  .emoji-picker.open { display: flex; }
  .emoji-btn-trigger { background: none; border: 1px solid var(--border-soft); border-radius: 8px; padding: 4px 10px; font-size: 0.875rem; cursor: pointer; color: var(--text-muted); font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
  .emoji-btn-trigger:hover { border-color: var(--terra-mid); }
  .emoji-item { background: none; border: none; font-size: 1.25rem; cursor: pointer; padding: 3px; border-radius: 4px; line-height: 1; }
  .emoji-item:hover { background: var(--terra-cream); }
  .comment-like-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--border-soft); border-radius: 100px; padding: 3px 10px; font-size: 0.8125rem; cursor: pointer; color: var(--text-muted); font-family: 'Inter', sans-serif; margin-top: 0.625rem; transition: all 0.2s; }
  .comment-like-btn:hover { border-color: var(--terra-mid); color: var(--terra-mid); }
  .comment-like-btn.active { background: var(--terra-cream); border-color: var(--terra-mid); color: var(--terra-mid); }

  /* ADMIN INLINE CONTROLS */
  .admin-delete-story { background: #FCEBEB; border: 1px solid #f0c0c0; color: #A32D2D; font-size: 0.8125rem; padding: 6px 16px; border-radius: 100px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .admin-delete-story:hover { background: #A32D2D; color: white; }
  .comment-card { position: relative; }
  .admin-delete-comment { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #A32D2D; font-size: 0.8125rem; cursor: pointer; opacity: 0.6; }
  .admin-delete-comment:hover { opacity: 1; }

  .translate-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; border: 1px solid var(--border-soft); border-radius: 100px; padding: 6px 16px; transition: all 0.2s; margin-top: 1.5rem; }
  .translate-btn:hover { border-color: var(--terra-mid); color: var(--terra-mid); }

  /* FOOTER */
  footer { background: var(--text-dark); color: rgba(255,255,255,0.5); padding: 2rem; text-align: center; font-size: 0.8125rem; }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.125rem; color: white; margin-bottom: 0.25rem; }

  @media (max-width: 640px) {
    .story-wrap { padding: 2.5rem 1.25rem 4rem; }
    nav { padding: 0 1.25rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SunRi-Ssakhi</a>
  <a href="index.html#stories" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    All stories
  </a>
</nav>

<div id="page-content">
  <div class="state-wrap">
    <div class="state-box">
      <p>Loading story...</p>
    </div>
  </div>
</div>

<div class="comments-section" id="comments-section" style="display:none;">
  <h2 class="comments-title">Responses</h2>
  <div id="comment-form-area"></div>
  <div class="comments-list" id="comments-list">
    <p class="no-comments">Loading responses...</p>
  </div>
</div>

<div class="write-cta" id="write-cta" style="display:none;">
  <div class="write-cta-inner">
    <h3>Have a story <em>of your own?</em></h3>
    <p>SunRi-Ssakhi is where women write in any language, from anywhere in the world.</p>
    <a href="index.html#stories" class="btn-write">Share your story</a>
  </div>
</div>

<footer>
  <p class="footer-logo">SunRi-Ssakhi</p>
  <p>Her voice. Her world.</p>
</footer>

<script>
  const SUPABASE_URL = 'https://lcdwzdmxkpqgstlxjmyq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3iDkjlu4yEkgkgvr6WlEOQ_hZNhaNU6';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_EMAIL = 'ambica.clc@gmail.com';
  let currentStoryId = null;
  let currentUser = null;

  db.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
  });

  function getGuestToken() {
    let token = localStorage.getItem('srs_guest_token');
    if (!token) {
      token = 'guest_' + Math.random().toString(36).slice(2) + Date.now();
      localStorage.setItem('srs_guest_token', token);
    }
    return token;
  }

  function isAdmin() {
    return currentUser && currentUser.email === ADMIN_EMAIL;
  }

  async function loadLikes(storyId) {
    const { data } = await db.from('likes').select('value').eq('story_id', storyId);
    if (!data) return;
    const likes = data.filter(r => r.value === 1).length;
    const dislikes = data.filter(r => r.value === -1).length;
    const lcEl = document.getElementById('sp-lc');
    const dcEl = document.getElementById('sp-dc');
    if (lcEl) lcEl.textContent = likes;
    if (dcEl) dcEl.textContent = dislikes;

    const myVote = await getMyVote(storyId);
    const likeBtn = document.getElementById('sp-like');
    const dislikeBtn = document.getElementById('sp-dislike');
    if (likeBtn) likeBtn.classList.toggle('active-like', myVote === 1);
    if (dislikeBtn) dislikeBtn.classList.toggle('active-dislike', myVote === -1);
  }

  async function getMyVote(storyId) {
    if (currentUser && !isAdmin()) {
      const { data } = await db.from('likes').select('value').eq('story_id', storyId).eq('user_id', currentUser.id).single();
      return data?.value || 0;
    } else if (!currentUser) {
      const token = getGuestToken();
      const { data } = await db.from('likes').select('value').eq('story_id', storyId).eq('guest_token', token).single();
      return data?.value || 0;
    }
    return 0;
  }

  async function vote(storyId, value) {
    if (isAdmin()) {
      const adminToken = 'admin_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2) + '_' + Date.now();
      await db.from('likes').insert({ story_id: storyId, value, guest_token: adminToken });
      loadLikes(storyId);
      return;
    }
    if (currentUser) {
      const { data: existing } = await db.from('likes').select('id, value').eq('story_id', storyId).eq('user_id', currentUser.id).single();
      if (existing) {
        if (existing.value === value) { await db.from('likes').delete().eq('id', existing.id); }
        else { await db.from('likes').update({ value }).eq('id', existing.id); }
      } else {
        await db.from('likes').insert([{ story_id: storyId, user_id: currentUser.id, value }]);
      }
    } else {
      const token = getGuestToken();
      const { data: existing } = await db.from('likes').select('id, value').eq('story_id', storyId).eq('guest_token', token).single();
      if (existing) {
        if (existing.value === value) { await db.from('likes').delete().eq('id', existing.id); }
        else { await db.from('likes').update({ value }).eq('id', existing.id); }
      } else {
        await db.from('likes').insert([{ story_id: storyId, guest_token: token, value }]);
      }
    }
    loadLikes(storyId);
  }




  async function loadComments(storyId) {
    const { data, error } = await db
      .from('comments')
      .select('*')
      .eq('story_id', storyId)
      .order('created_at', { ascending: true });

    const list = document.getElementById('comments-list');
    if (!list) return;

    if (error || !data || data.length === 0) {
      list.innerHTML = '<p class="no-comments">No responses yet. Be the first to respond.</p>';
    } else {
      list.innerHTML = data.map(c => `
        <div class="comment-card" id="cc-${c.id}">
          ${isAdmin() ? `<button class="admin-delete-comment" onclick="adminDeleteComment(${c.id}, ${storyId})">Delete</button>` : ''}
          <div class="comment-header">
            <div class="comment-avatar">${getInitials(c.author_name)}</div>
            <span class="comment-author">${c.author_name || 'Anonymous'}</span>
            <span class="comment-date">${new Date(c.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
          </div>
          <p class="comment-body">${escapeHtml(c.content)}</p>
          <button class="comment-like-btn" id="clb-${c.id}" onclick="likeComment(${c.id})">👍 <span id="clc-${c.id}">0</span></button>
        </div>
      `).join('');
      data.forEach(c => loadCommentLikes(c.id));
    }

    renderCommentForm(storyId);
    document.getElementById('comments-section').style.display = 'block';
  }

  function renderCommentForm(storyId) {
    const area = document.getElementById('comment-form-area');
    if (!area) return;

    if (!currentUser) {
      area.innerHTML = `<div class="comment-login-note">Sign in to leave a response. <a href="index.html">Join SunRi-Ssakhi</a></div>`;
      return;
    }

    const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
    const emojis = ['❤️','🌸','✨','🙏','💪','😊','🌺','💫','🌿','🕊️','🌻','💕','🤍','🌙','⭐','🦋','🌹','💖','🫶','🌼'];
    area.innerHTML = `
      <div class="comment-form">
        <div class="emoji-picker" id="emoji-picker">
          ${emojis.map(e => `<button class="emoji-item" onclick="insertEmoji('${e}')">${e}</button>`).join('')}
        </div>
        <textarea id="comment-input" placeholder="Share your thoughts on this story..."></textarea>
        <div class="comment-form-footer">
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <button class="emoji-btn-trigger" onclick="toggleEmojiPicker()">😊 Emoji</button>
            <span class="comment-form-note">Posting as ${name}</span>
          </div>
          <button class="btn-comment" id="comment-btn" onclick="submitComment(${storyId})">Post response</button>
        </div>
      </div>
    `;
  }

  async function submitComment(storyId) {
    if (!currentUser) return;
    const input = document.getElementById('comment-input');
    const content = input?.value.trim();
    if (!content) return;

    const btn = document.getElementById('comment-btn');
    btn.disabled = true;
    btn.textContent = 'Posting...';

    const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];

    const { error } = await db.from('comments').insert([{
      story_id: storyId,
      user_id: currentUser.id,
      author_name: name,
      content: content
    }]);

    btn.disabled = false;
    btn.textContent = 'Post response';

    if (!error) {
      input.value = '';
      loadComments(storyId);
    }
  }


  function toggleEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    if (picker) picker.classList.toggle('open');
  }

  function insertEmoji(emoji) {
    const input = document.getElementById('comment-input');
    if (!input) return;
    const pos = input.selectionStart;
    input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
    input.selectionStart = input.selectionEnd = pos + emoji.length;
    input.focus();
  }

  async function loadCommentLikes(commentId) {
    const { data } = await db.from('comment_likes').select('id').eq('comment_id', commentId);
    const el = document.getElementById('clc-' + commentId);
    if (el) el.textContent = data?.length || 0;

    const btn = document.getElementById('clb-' + commentId);
    if (!btn) return;
    const myLike = await getMyCommentLike(commentId);
    btn.classList.toggle('active', myLike);
  }

  async function getMyCommentLike(commentId) {
    if (currentUser) {
      const { data } = await db.from('comment_likes').select('id').eq('comment_id', commentId).eq('user_id', currentUser.id).single();
      return !!data;
    }
    const token = getGuestToken();
    const { data } = await db.from('comment_likes').select('id').eq('comment_id', commentId).eq('guest_token', token).single();
    return !!data;
  }

  async function likeComment(commentId) {
    const existing = await getMyCommentLike(commentId);
    if (existing) {
      if (currentUser) {
        await db.from('comment_likes').delete().eq('comment_id', commentId).eq('user_id', currentUser.id);
      } else {
        await db.from('comment_likes').delete().eq('comment_id', commentId).eq('guest_token', getGuestToken());
      }
    } else {
      if (currentUser) {
        await db.from('comment_likes').insert([{ comment_id: commentId, user_id: currentUser.id }]);
      } else {
        await db.from('comment_likes').insert([{ comment_id: commentId, guest_token: getGuestToken() }]);
      }
    }
    loadCommentLikes(commentId);
  }

  function getInitials(name) {
    if (!name) return '?';
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function formatDate(str) {
    return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }


  async function memberDeleteThisStory(id) {
    if (!confirm('Delete your story permanently? This cannot be undone.')) return;
    await db.from('Stories').delete().eq('id', id).eq('user_id', currentUser.id);
    window.location.href = 'stories.html';
  }

  async function adminDeleteThisStory(id) {
    if (!confirm('Delete this story permanently? You will be returned to the home page.')) return;
    await db.from('Stories').delete().eq('id', id);
    window.location.href = 'index.html#stories';
  }

  async function adminDeleteComment(id, storyId) {
    if (!confirm('Delete this comment permanently?')) return;
    await db.from('comments').delete().eq('id', id);
    loadComments(storyId);
  }

  async function loadStory() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      showError('No story found.');
      return;
    }

    const { data, error } = await db
      .from('Stories')
      .select('*')
      .eq('id', id)
      .eq('status', 'approved')
      .single();

    if (error || !data) {
      showError('This story could not be found.');
      return;
    }

    currentStoryId = data.id;
    renderStory(data);
    setTimeout(() => loadLikes(data.id), 100);
    setTimeout(() => loadComments(data.id), 150);
  }

  function renderStory(s) {
    document.title = (s.title || 'A story') + ' — SunRi-Ssakhi';

    document.getElementById('page-content').innerHTML = `
      <div class="story-wrap">
        <div class="story-header">
          <span class="story-lang-badge">${s.language || 'Unknown language'}</span>
          <h1 class="story-title">${s.title || 'Untitled'}</h1>
          <div class="story-author-row">
            <div class="avatar">${getInitials(s.author_name)}</div>
            <div>
              <p class="author-name">${s.author_name || 'Anonymous'}</p>
              <p class="author-meta">${s.location ? s.location + ' · ' : ''}${formatDate(s.created_at)}</p>
            </div>
          </div>
        </div>
        <div class="story-accent"></div>
        <div class="story-body">${formatStoryContent(s.content)}</div>
        <a class="translate-btn" href="https://translate.google.com/?sl=auto&tl=en&text=${encodeURIComponent((s.title ? s.title + ': ' : '') + s.content)}&op=translate" target="_blank" rel="noopener">🌐 Translate to English</a>
        <div class="like-bar">
          <span class="like-label">Was this story meaningful to you?</span>
          <button class="like-btn" id="sp-like" onclick="vote(${s.id}, 1)">👍 <span id="sp-lc">0</span></button>
          <button class="like-btn" id="sp-dislike" onclick="vote(${s.id}, -1)">👎 <span id="sp-dc">0</span></button>
        </div>
        <div class="story-footer-nav">
          <a href="index.html#stories" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
            Back to all stories
          </a>
          <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
            ${currentUser && currentUser.id === s.user_id ? `
              <a href="write.html?id=${s.id}" style="font-size:0.8125rem; color:var(--terra-mid); border:1px solid var(--border-soft); padding:8px 18px; border-radius:100px; text-decoration:none;">Edit story</a>
            ` : ''}
            ${isAdmin() ? `<button class="admin-delete-story" onclick="adminDeleteThisStory(${s.id})">Delete story</button>` : (currentUser && currentUser.id === s.user_id ? `<button style="font-size:0.8125rem; color:#A32D2D; background:#FCEBEB; border:1px solid #f0c0c0; padding:8px 18px; border-radius:100px; cursor:pointer; font-family:Inter,sans-serif;" onclick="memberDeleteThisStory(${s.id})">Delete</button>` : '')}
            <button class="share-btn" onclick="shareStory()">Share this story</button>
          </div>
        </div>
      </div>
    `;

    document.getElementById('write-cta').style.display = 'block';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text || ''));
    return div.innerHTML;
  }

  function formatStoryContent(text) {
    if (!text) return '';
    const escaped = escapeHtml(text);
    // Split on double newlines for paragraphs, single newlines become <br>
    const paragraphs = escaped.split(/\n\n+/);
    if (paragraphs.length > 1) {
      return paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    }
    // Single block — wrap in p and convert single newlines to br
    return `<p>${escaped.replace(/\n/g, '<br>')}</p>`;
  }

  function showError(msg) {
    document.getElementById('page-content').innerHTML = `
      <div class="state-wrap">
        <div class="state-box">
          <p>${msg}</p>
          <a href="index.html" class="btn-home">Back to SunRi-Ssakhi</a>
        </div>
      </div>
    `;
  }

  function shareStory() {
    if (navigator.share) {
      navigator.share({ title: document.title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector('.share-btn');
        btn.textContent = 'Link copied!';
        setTimeout(() => btn.textContent = 'Share this story', 2000);
      });
    }
  }

  loadStory();
</script>
</body>
</html>
