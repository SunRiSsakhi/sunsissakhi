<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — SunRi-Ssakhi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --terra-deep: #7A2E14; --terra-mid: #C0623A; --terra-light: #F4A98A;
    --terra-pale: #F9CBB8; --terra-cream: #FEF6F2; --terra-ivory: #FFFAF8;
    --text-dark: #2A1208; --text-mid: #5C3520; --text-muted: #9B6B58;
    --border-soft: #F0D0C0;
  }
  body { font-family: 'Inter', sans-serif; background: var(--terra-ivory); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }

  nav {
    background: rgba(255,250,248,0.95);
    border-bottom: 1px solid var(--border-soft);
    padding: 0.75rem 2rem;
    display: flex; align-items: center; min-height: 60px;
  }
  .logo-wrap { display: inline-flex; flex-direction: column; align-items: center; }
  .nav-logo { font-family: 'Georgia', serif; font-size: 1.375rem; font-weight: 700; font-style: italic; color: #FEF6F2; background: #7A2E14; padding: 6px 16px; border-radius: 6px; text-decoration: none; }
  .logo-tagline { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-align: center; }

  .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .card { background: white; border: 1px solid var(--border-soft); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .card-eyebrow { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terra-mid); margin-bottom: 0.75rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.5rem; }
  .card-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.75rem; line-height: 1.6; }

  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text-mid); margin-bottom: 0.375rem; }
  .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border-soft); border-radius: 10px; font-size: 0.9375rem; font-family: 'Inter', sans-serif; color: var(--text-dark); background: var(--terra-ivory); outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--terra-mid); }

  .field-error { font-size: 0.8125rem; color: #A32D2D; margin-top: 0.25rem; display: none; }

  .btn-primary { width: 100%; background: var(--terra-mid); color: white; border: none; padding: 13px; border-radius: 100px; font-size: 0.9375rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
  .btn-primary:hover { background: var(--terra-deep); }
  .btn-primary:disabled { background: var(--terra-pale); cursor: not-allowed; }

  .success-state { text-align: center; }
  .success-icon { font-size: 3rem; margin-bottom: 1rem; }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.375rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.5rem; }
  .success-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .btn-home { display: inline-block; background: var(--terra-mid); color: white; padding: 12px 28px; border-radius: 100px; font-size: 0.9375rem; font-weight: 500; text-decoration: none; transition: background 0.2s; }
  .btn-home:hover { background: var(--terra-deep); }

  .loading { text-align: center; padding: 2rem; color: var(--text-muted); }
</style>
</head>
<body>

<nav>
  <div class="logo-wrap">
    <a href="index.html" class="nav-logo">SunRi-Ssakhi</a>
    <p class="logo-tagline">A place to pause.<br>A place to breathe.<br>A place to be heard.</p>
  </div>
</nav>

<div class="page-wrap">
  <div class="card" id="card">
    <p class="loading">Loading...</p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://lcdwzdmxkpqgstlxjmyq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3iDkjlu4yEkgkgvr6WlEOQ_hZNhaNU6';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  function renderForm() {
    document.getElementById('card').innerHTML = `
      <p class="card-eyebrow">Password reset</p>
      <h1 class="card-title">Set a new password</h1>
      <p class="card-sub">Choose a new password for your SunRi-Ssakhi account.</p>
      <div class="form-group">
        <label>New password</label>
        <input type="password" id="new-password" placeholder="At least 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your new password">
        <p class="field-error" id="pw-error"></p>
      </div>
      <button class="btn-primary" id="reset-btn" onclick="updatePassword()">Set new password</button>
    `;
  }

  function renderSuccess() {
    document.getElementById('card').innerHTML = `
      <div class="success-state">
        <div class="success-icon">✅</div>
        <h2 class="success-title">Password updated!</h2>
        <p class="success-sub">Your password has been changed successfully. You can now sign in with your new password.</p>
        <a href="index.html" class="btn-home">Go to SunRi-Ssakhi</a>
      </div>
    `;
  }

  function renderError(msg) {
    document.getElementById('card').innerHTML = `
      <div class="success-state">
        <div class="success-icon">⚠️</div>
        <h2 class="success-title">Link expired</h2>
        <p class="success-sub">${msg || 'This password reset link has expired or is invalid. Please request a new one.'}</p>
        <a href="index.html" class="btn-home">Back to sign in</a>
      </div>
    `;
  }

  async function updatePassword() {
    const newPw = document.getElementById('new-password')?.value;
    const confirmPw = document.getElementById('confirm-password')?.value;
    const errEl = document.getElementById('pw-error');
    const btn = document.getElementById('reset-btn');

    errEl.style.display = 'none';

    if (!newPw || newPw.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.style.display = 'block';
      return;
    }
    if (newPw !== confirmPw) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await db.auth.updateUser({ password: newPw });

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Set new password';
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      return;
    }

    renderSuccess();
  }

  // Listen for auth state — Supabase handles the token from URL hash
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      renderForm();
    } else if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
      renderForm();
    }
  });

  // Check if token is in URL
  const hash = window.location.hash;
  if (hash && (hash.includes('type=recovery') || hash.includes('access_token'))) {
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) renderForm();
      else renderError();
    });
  } else {
    renderError('No valid reset link found.');
  }
</script>
</body>
</html>
