<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share your work — SunRi-Ssakhi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --terra-deep: #7A2E14;
    --terra-mid: #C0623A;
    --terra-light: #F4A98A;
    --terra-pale: #F9CBB8;
    --terra-cream: #FEF6F2;
    --terra-ivory: #FFFAF8;
    --text-dark: #2A1208;
    --text-mid: #5C3520;
    --text-muted: #9B6B58;
    --border-soft: #F0D0C0;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--terra-ivory); color: var(--text-dark); line-height: 1.7; min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,250,248,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .nav-logo { font-family: 'Georgia', 'Playfair Display', serif; font-size: 1.375rem; font-weight: 700; font-style: italic; color: #FEF6F2; background: #7A2E14; padding: 6px 16px; border-radius: 6px; text-decoration: none; letter-spacing: 0.01em; }
  .nav-back { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--terra-mid); }
  .nav-back svg { width: 16px; height: 16px; }

  .page-wrap { max-width: 640px; margin: 0 auto; padding: 3.5rem 2rem 5rem; }

  .page-eyebrow { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--terra-mid); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
  .page-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--terra-mid); }
  .page-title { font-family: 'Playfair Display', serif; font-size: clamp(1.75rem, 3.5vw, 2.5rem); font-weight: 400; color: var(--text-dark); line-height: 1.25; margin-bottom: 1rem; }
  .page-title em { font-style: italic; color: var(--terra-mid); }
  .page-sub { font-size: 1rem; color: var(--text-mid); line-height: 1.8; margin-bottom: 2.5rem; max-width: 480px; }

  /* AUTH GATE */
  .auth-gate { text-align: center; padding: 3rem 2rem; background: white; border: 1px solid var(--border-soft); border-radius: 16px; }
  .auth-gate h2 { font-family: 'Playfair Display', serif; font-size: 1.375rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.75rem; }
  .auth-gate p { font-size: 0.9375rem; color: var(--text-mid); margin-bottom: 1.5rem; }
  .btn-join { display: inline-block; background: var(--terra-mid); color: white; padding: 13px 28px; border-radius: 100px; font-size: 0.9375rem; font-weight: 500; text-decoration: none; transition: background 0.2s; }
  .btn-join:hover { background: var(--terra-deep); }

  /* UPLOAD AREA */
  .upload-zone {
    border: 2px dashed var(--border-soft);
    border-radius: 16px;
    background: white;
    text-align: center;
    padding: 3rem 2rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--terra-mid); background: var(--terra-cream); }
  .upload-zone-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .upload-zone-text { font-size: 0.9375rem; color: var(--text-mid); margin-bottom: 0.5rem; }
  .upload-zone-sub { font-size: 0.8125rem; color: var(--text-muted); }
  .upload-zone input[type="file"] { display: none; }

  .preview-wrap { position: relative; margin-bottom: 1.5rem; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-soft); }
  .preview-img { width: 100%; max-height: 420px; object-fit: cover; display: block; }
  .preview-remove { position: absolute; top: 12px; right: 12px; background: rgba(42,18,8,0.7); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .preview-remove:hover { background: rgba(42,18,8,0.9); }

  /* FORM */
  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text-mid); margin-bottom: 0.375rem; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border-soft); border-radius: 10px;
    font-size: 0.9375rem; font-family: 'Inter', sans-serif; color: var(--text-dark);
    background: white; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--terra-mid); }
  .form-group textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .submit-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-soft); flex-wrap: wrap; gap: 1rem; }
  .submit-bar-note { font-size: 0.875rem; color: var(--text-muted); }
  .btn-submit-work { background: var(--terra-mid); color: white; padding: 13px 32px; border-radius: 100px; font-size: 0.9375rem; font-weight: 500; border: none; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-submit-work:hover { background: var(--terra-deep); }
  .btn-submit-work:disabled { background: var(--terra-pale); cursor: not-allowed; }

  /* SUCCESS */
  .success-state { text-align: center; padding: 4rem 2rem; }
  .success-icon { font-size: 3rem; margin-bottom: 1rem; }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.75rem; }
  .success-sub { font-size: 1rem; color: var(--text-mid); line-height: 1.75; margin-bottom: 2rem; }
  .btn-back-home { display: inline-block; background: var(--terra-mid); color: white; padding: 12px 28px; border-radius: 100px; font-size: 0.9375rem; font-weight: 500; text-decoration: none; transition: background 0.2s; }
  .btn-back-home:hover { background: var(--terra-deep); }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--terra-deep); color: white; padding: 12px 24px; border-radius: 100px; font-size: 0.9375rem; z-index: 300; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .page-wrap { padding: 2rem 1.25rem 3rem; }
    nav { padding: 0 1.25rem; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SunRi-Ssakhi</a>
  <a href="index.html#work" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    Back
  </a>
</nav>

<div class="page-wrap">
  <p class="page-eyebrow">Share your work</p>
  <h1 class="page-title">What you have made,<br><em>the world should see.</em></h1>
  <p class="page-sub">Art, craft, business, writing, research — show the community what you have built.</p>

  <div id="content-area">
    <div class="auth-gate">
      <h2>Sign in to share your work</h2>
      <p>You need to be a SunRi-Ssakhi member to upload your work.</p>
      <a href="index.html" class="btn-join">Join SunRi-Ssakhi</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://lcdwzdmxkpqgstlxjmyq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3iDkjlu4yEkgkgvr6WlEOQ_hZNhaNU6';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let selectedFile = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function renderForm(user) {
    const meta = user.user_metadata;
    const name = meta?.full_name || meta?.name || '';
    const location = meta?.location || '';

    document.getElementById('content-area').innerHTML = `
      <div id="upload-area">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div class="upload-zone-icon">🖼️</div>
          <p class="upload-zone-text">Click to upload an image, or drag it here</p>
          <p class="upload-zone-sub">JPG or PNG, up to 5MB</p>
          <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
        </div>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="w-title" placeholder="Name your work">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="w-name" value="${name}" placeholder="How you want to appear">
        </div>
        <div class="form-group">
          <label>Where are you from?</label>
          <input type="text" id="w-location" value="${location}" placeholder="City, country">
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="w-category">
          <option value="">Choose a category</option>
          <option value="Art">Art</option>
          <option value="Craft">Craft & textile</option>
          <option value="Writing">Writing</option>
          <option value="Business">Business & enterprise</option>
          <option value="Photography">Photography</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tell us about it</label>
        <textarea id="w-description" placeholder="What is this, and what does it mean to you?"></textarea>
      </div>

      <div class="submit-bar">
        <p class="submit-bar-note">Your work will be reviewed before going live.</p>
        <button class="btn-submit-work" id="submit-btn" onclick="submitWork()">Share my work</button>
      </div>
    `;
  }

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('Image must be under 5MB.');
      return;
    }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('upload-area').innerHTML = `
        <div class="preview-wrap">
          <img src="${e.target.result}" class="preview-img">
          <button class="preview-remove" onclick="removeFile()">✕</button>
        </div>
      `;
    };
    reader.readAsDataURL(file);
  }

  function removeFile() {
    selectedFile = null;
    document.getElementById('upload-area').innerHTML = `
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-zone-icon">🖼️</div>
        <p class="upload-zone-text">Click to upload an image, or drag it here</p>
        <p class="upload-zone-sub">JPG or PNG, up to 5MB</p>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
      </div>
    `;
  }

  function renderSuccess() {
    document.getElementById('content-area').innerHTML = `
      <div class="success-state">
        <div class="success-icon">🎨</div>
        <h2 class="success-title">Your work has been received.</h2>
        <p class="success-sub">Thank you for sharing what you have made. We will review it and it will be live soon.</p>
        <a href="index.html#work" class="btn-back-home">See other work</a>
      </div>
    `;
  }

  async function submitWork() {
    if (!currentUser) return;
    if (!selectedFile) { showToast('Please upload an image first.'); return; }

    const title = document.getElementById('w-title')?.value.trim();
    const name = document.getElementById('w-name')?.value.trim();
    const location = document.getElementById('w-location')?.value.trim();
    const category = document.getElementById('w-category')?.value;
    const description = document.getElementById('w-description')?.value.trim();

    if (!title) { showToast('Please give your work a title.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';

    const ext = selectedFile.name.split('.').pop();
    const fileName = `${currentUser.id}_${Date.now()}.${ext}`;

    const { error: uploadError } = await db.storage.from('work-images').upload(fileName, selectedFile);

    if (uploadError) {
      btn.disabled = false;
      btn.textContent = 'Share my work';
      showToast('Upload failed. Please try again.');
      console.error(uploadError);
      return;
    }

    const { data: urlData } = db.storage.from('work-images').getPublicUrl(fileName);

    const { error: insertError } = await db.from('work').insert([{
      user_id: currentUser.id,
      author_name: name || 'Anonymous',
      location: location || '',
      title: title,
      description: description || '',
      category: category || 'Other',
      image_url: urlData.publicUrl,
      status: 'pending'
    }]);

    btn.disabled = false;
    btn.textContent = 'Share my work';

    if (insertError) {
      showToast('Something went wrong. Please try again.');
      console.error(insertError);
      return;
    }

    renderSuccess();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  db.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    if (currentUser) renderForm(currentUser);
  });

  db.auth.getSession().then(({ data: { session } }) => {
    currentUser = session?.user || null;
    if (currentUser) renderForm(currentUser);
  });
</script>
</body>
</html>
